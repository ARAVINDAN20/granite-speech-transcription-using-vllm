<!DOCTYPE html>
<html>
<head>
    <title>🎤 Mic Test</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; max-width: 600px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #10b981; color: white; }
        .status { padding: 15px; margin: 15px 0; border-radius: 8px; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .info { background: #dbeafe; color: #1e40af; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎤 Microphone & Server Test</h1>
        
        <h3>Step 1: Check Server Status</h3>
        <button class="btn-primary" onclick="checkServer()">🔌 Test Server Connection</button>
        <div id="serverStatus"></div>
        
        <h3>Step 2: Test Microphone</h3>
        <button class="btn-primary" onclick="testMic()">🎤 Request Mic Access</button>
        <div id="micStatus"></div>
        
        <h3>Step 3: Test Transcription</h3>
        <button class="btn-success" onclick="startRecording()">🔴 Record & Transcribe</button>
        <button id="stopBtn" class="btn-primary" onclick="stopRecording()" disabled>⏹ Stop</button>
        <div id="recordStatus"></div>
        <div id="result"></div>
    </div>

    <script>
        let mediaRecorder, chunks = [];

        async function checkServer() {
            const status = document.getElementById('serverStatus');
            status.innerHTML = '<div class="info">Checking...</div>';
            
            try {
                // Test models endpoint
                const resp = await fetch('/v1/models');
                if (!resp.ok) throw new Error(`Status ${resp.status}`);
                
                const data = await resp.json();
                const model = data.data?.[0]?.id || 'Unknown';
                
                status.innerHTML = `<div class="success">✅ Server Online!<br>Model: ${model}</div>`;
            } catch (e) {
                status.innerHTML = `<div class="error">❌ Server Error: ${e.message}<br>Make sure services are running: docker compose ps</div>`;
            }
        }

        async function testMic() {
            const status = document.getElementById('micStatus');
            status.innerHTML = '<div class="info">Requesting microphone access...</div>';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                status.innerHTML = `<div class="success">✅ Microphone Access Granted!<br>Device: ${stream.getAudioTracks()[0].label}</div>`;
                
                // Stop the stream
                stream.getTracks().forEach(t => t.stop());
                
            } catch (e) {
                let msg = e.message;
                if (e.name === 'NotAllowedError') {
                    msg = 'Microphone access denied! Click the 🔒 icon in address bar and allow microphone.';
                } else if (e.name === 'NotFoundError') {
                    msg = 'No microphone found. Connect a microphone and try again.';
                }
                status.innerHTML = `<div class="error">❌ Microphone Error: ${msg}</div>`;
            }
        }

        async function startRecording() {
            const status = document.getElementById('recordStatus');
            const result = document.getElementById('result');
            const stopBtn = document.getElementById('stopBtn');
            
            chunks = [];
            result.innerHTML = '';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000
                    } 
                });
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    status.innerHTML = `<div class="info">📤 Sending ${Math.round(blob.size/1024)}KB audio to server...</div>`;
                    
                    const formData = new FormData();
                    formData.append('file', blob, 'test.webm');
                    formData.append('model', 'ibm-granite/granite-4.0-1b-speech');
                    formData.append('accumulate', 'true');
                    
                    try {
                        const resp = await fetch('/v1/audio/transcriptions', {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response = await resp.json();
                        
                        if (resp.ok && data.text) {
                            result.innerHTML = `<div class="success"><h3>✅ Transcription Result:</h3><p>${data.text}</p></div>`;
                        } else {
                            result.innerHTML = `<div class="info"><h3>⚠️ Response:</h3><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                        }
                        
                        status.innerHTML = '<div class="success">✅ Done!</div>';
                        
                    } catch (e) {
                        result.innerHTML = `<div class="error"><h3>❌ Error:</h3><pre>${e.message}</pre></div>`;
                        status.innerHTML = '';
                    }
                    
                    // Stop mic
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start(1000);
                status.innerHTML = '<div class="success">🔴 Recording... Speak now! (5 seconds)</div>';
                stopBtn.disabled = false;
                
                // Auto-stop after 5 seconds
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        stopBtn.disabled = true;
                    }
                }, 5000);
                
            } catch (e) {
                status.innerHTML = `<div class="error">❌ Error: ${e.message}</div>`;
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                document.getElementById('stopBtn').disabled = true;
            }
        }
    </script>
</body>
</html>
